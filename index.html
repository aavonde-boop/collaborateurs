function parseWDFileAsync(file,type,wdCache,setWdCache,showToast,setLoading){
  setLoading(true);
  const reader=new FileReader();
  reader.onload=e=>{
    try{
      const wb=XLSX.read(e.target.result,{type:"binary"});
      let wsName=wb.SheetNames[0];
      const wdTab=wb.SheetNames.find(s=>s.toLowerCase().includes("workday"));
      if(wdTab)wsName=wdTab;
      const ws=wb.Sheets[wsName];
      const keys=Object.keys(ws).filter(k=>!k.startsWith("!"));
      if(keys.length>0){let maxR=0,maxC=0;keys.forEach(addr=>{try{const d=XLSX.utils.decode_cell(addr);if(d.r>maxR)maxR=d.r;if(d.c>maxC)maxC=d.c;}catch(e){}});ws["!ref"]=XLSX.utils.encode_range({s:{r:0,c:0},e:{r:maxR,c:maxC}});}
      const data=XLSX.utils.sheet_to_json(ws,{header:1,defval:""});
      let hRow=-1;
      for(let i=0;i<Math.min(data.length,30);i++){if(Array.isArray(data[i])&&data[i].some(v=>String(v||"").toLowerCase().replace(/\s+/g," ").trim()==="employee id")){hRow=i;break;}}
      if(hRow<0){alert("Colonne 'Employee ID' introuvable dans : "+file.name);setLoading(false);return;}
      const headers=data[hRow].map(h=>String(h||"").trim());
      const parsed=[];
      data.slice(hRow+1).filter(r=>Array.isArray(r)&&r.some(v=>v!==""&&v!==null)).forEach(r=>{
        const o={};headers.forEach((h,i)=>{if(h)o[h]=r[i]!=null?r[i]:"";});
        const mat=String(o["Employee ID"]||"").trim();
        const nom=String(o["Preferred Name - Last Name"]||"").trim().toUpperCase();
        const prenom=String(o["Preferred Name - First Name"]||"").trim();
        if(!mat||!nom)return;
        const toISO=v=>{if(!v||v==="")return"";if(typeof v==="number")return xlsxDateToISO(v);const s=String(v).trim();if(!s||s==="NaN")return"";const dm=s.match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})/);if(dm)return dm[3]+"-"+dm[2].padStart(2,"0")+"-"+dm[1].padStart(2,"0");if(/^\d{4}-\d{2}-\d{2}/.test(s))return s.slice(0,10);try{const d=new Date(s);if(!isNaN(d))return d.toISOString().slice(0,10);}catch{}return"";};
        parsed.push({matricule:mat,nom,prenom,email:String(o["Email - Primary Work"]||o["Work Email"]||"").trim(),manager:String(o["Manager's Name"]||o["Manager"]||"").trim(),mailMgr:String(o["Manager e-mail"]||o["Manager's Email"]||"").trim(),hireDate:toISO(o["Hire Date"]),termDate:toISO(o["Termination Date"])});
      });
      if(!parsed.length){alert("Aucune donnée valide.");setLoading(false);return;}
      setWdCache(prev=>{const next={...(prev||{})};parsed.forEach(p=>{next[p.matricule]=p;});return next;});
      showToast("✅ "+parsed.length+" chargés ("+(type==="hr"?"HR Data":"Future Hires")+")");
    }catch(err){alert("Erreur : "+err.message);}
    setLoading(false);
  };
  reader.readAsBinaryString(file);
}

function parseRacineAsync(file,badges,setBadges,setCasiers,showToast,setLoading,addLog){

        const wsC=sheets.find(s=>s.includes("Casier")||s.includes("📦"));
        if(wsA)readSh(wb.Sheets[wsA]).forEach(r=>{const nom=String(r["Nom"]||"").trim().toUpperCase(),prenom=String(r["Prénom"]||"").trim();if(!nom&&!prenom)return;newBadges.push({id:id++,matricule:String(r["Matricule"]||"").trim(),nom,prenom,email:String(r["Email"]||"").trim(),serie:String(r["N° Badge (Série)"]||r["N° Série Badge"]||"").trim(),zeplug:String(r["N° Zeplug"]||"").trim(),carte_rechargement:String(r["N° Zeplug"]||"").trim(),casier:String(r["N° Casier"]||"").trim(),manager:String(r["Manager"]||"").trim(),mail_manager:String(r["Mail Manager"]||"").trim(),statut:"Actif",date_sortie_prevue:"",date_archive:"",commentaire:""});});
        if(wsR)readSh(wb.Sheets[wsR]).forEach(r=>{const nom=String(r["Nom"]||"").trim().toUpperCase(),prenom=String(r["Prénom"]||"").trim();if(!nom&&!prenom)return;newBadges.push({id:id++,matricule:String(r["Matricule"]||"").trim(),nom,prenom,email:String(r["Email"]||"").trim(),serie:String(r["N° Badge (Série)"]||"").trim(),zeplug:String(r["N° Zeplug"]||"").trim(),carte_rechargement:String(r["N° Zeplug"]||"").trim(),casier:String(r["N° Casier"]||"").trim(),manager:String(r["Manager"]||"").trim(),mail_manager:String(r["Mail Manager"]||"").trim(),statut:"À récupérer",date_sortie_prevue:"",date_archive:"",commentaire:""});});

        if(!newBadges.length&&!wsA&&!wsR){alert("Format non reconnu.");setLoading(false);return;}

function parseMSListsCSV(text){
  const lines=text.split(/\r?\n/);if(lines.length<2)return[];
  const sep=lines[0].includes(";")?";":",";
  const parseLine=line=>{const cols=[],cur=[];let inQ=false;for(const ch of line){if(ch==='"')inQ=!inQ;else if(ch===sep&&!inQ){cols.push(cur.join("").replace(/^"|"$/g,"").trim());cur.length=0;}else cur.push(ch);}cols.push(cur.join("").replace(/^"|"$/g,"").trim());return cols;};
  const headers=parseLine(lines[0]);
  return lines.slice(1).filter(l=>l.trim()).map((line,idx)=>{const cols=parseLine(line);const o={_idx:idx};headers.forEach((h,i)=>{o[h]=cols[i]||"";});return o;});
}
