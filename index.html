<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Collaborateurs</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/nodemailer/6.4.11/nodemailer.min.js"></script>
</head>
<body>
    <!-- Auto-save every 30 seconds to Supabase -->
    <script>
        setInterval(() => {
            // logic to save data to Supabase
        }, 30000);
    </script>

    <!-- KPI Section -->
    <div id="kpi">
        <h3>Count of Planned Exits Without Matricule: <span id="plannnedExitsCount">0</span></h3>
    </div>

    <!-- Delete Button for Exit Dates -->
    <div class="exit-dates">
        <button class="delete-button" onclick="deleteExitDate(this)">×</button>
    </div>

    <!-- Nodemailer Integration -->
    <script>
        function addArrivalDeparture() {
            // logic to add arrival/departure
            // example: send to IT using Nodemailer
            const transporter = nodemailer.createTransport({
                service: 'gmail',
                auth: {
                    user: 'your-email@example.com', // replace with IT email
                    pass: 'your-password' // replace with email password
                }
            });
            transporter.sendMail({
                from: 'your-email@example.com',
                to: 'it@example.com',
                subject: 'New Arrival/Departure Added',
                text: 'Details of the arrival/departure here...'
            });
        }
    </script>

    <!-- Settings Panel for IT Email -->
    <div id="settings">
        <label for="itEmail">IT Email:</label>
        <input type="email" id="itEmail" placeholder="Enter IT email here">
    </div>
</body>
</html>
