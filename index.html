<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="default"/>
<title>Gestion Collaborateurs LP24</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#F3F4F6;color:#1F2937;min-height:100vh}
button,input,select,textarea{font-family:inherit;outline:none;-webkit-appearance:none}
input,select{font-size:16px!important}/* évite zoom iOS */

/* ── NAV ── */
#nav{background:#0F172A;display:flex;align-items:center;height:52px;padding:0 12px;gap:4px;overflow-x:auto;position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,.3)}
#nav::-webkit-scrollbar{display:none}
.nav-brand{color:#fff;font-weight:700;font-size:13px;white-space:nowrap;margin-right:8px;flex-shrink:0}
.nav-btn{background:transparent;border:none;border-bottom:2px solid transparent;color:rgba(255,255,255,.6);padding:6px 10px;font-size:11px;font-weight:600;cursor:pointer;white-space:nowrap;flex-shrink:0;border-radius:6px;display:flex;align-items:center;gap:4px}
.nav-btn.active{color:#fff;border-bottom-color:#0891B2;background:rgba(255,255,255,.12)}
.nav-badge{background:#ED7D31;color:#fff;border-radius:999px;font-size:9px;font-weight:700;padding:1px 4px}
#nav-user{margin-left:auto;display:flex;align-items:center;gap:8px;flex-shrink:0}
.user-info{color:rgba(255,255,255,.8);font-size:11px;text-align:right}
.user-info small{color:rgba(255,255,255,.5);display:block;font-size:10px}
.logout-btn{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);color:#fff;padding:4px 8px;border-radius:6px;font-size:11px;cursor:pointer}

/* ── MAIN ── */
#main{max-width:1400px;margin:0 auto;padding:20px}

/* ── CARDS ── */
.card{background:#fff;border-radius:12px;box-shadow:0 1px 3px rgba(0,0,0,.08);padding:20px;margin-bottom:16px}
.card-title{font-size:18px;font-weight:700;margin-bottom:16px;display:flex;align-items:center;gap:8px}

/* ── BUTTONS ── */
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border:none;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;transition:opacity .15s}
.btn:active{opacity:.8}
.btn-primary{background:#0891B2;color:#fff}
.btn-success{background:#00B050;color:#fff}
.btn-danger{background:#E74C3C;color:#fff}
.btn-purple{background:#7C3AED;color:#fff}
.btn-outline{background:transparent;color:#6B7280;border:2px solid #D1D5DB}
.btn-sm{padding:4px 10px;font-size:12px;border-radius:6px}
.btn-icon-only{background:none;border:none;cursor:pointer;font-size:16px;padding:4px}

/* ── FORM ── */
.form-group{margin-bottom:12px}
.form-label{display:block;font-size:12px;font-weight:600;color:#6B7280;margin-bottom:4px}
.form-control{width:100%;padding:10px 12px;border:1px solid #D1D5DB;border-radius:8px;font-size:15px;background:#fff;color:#1F2937}
.form-control:focus{border-color:#0891B2;box-shadow:0 0 0 3px rgba(8,145,178,.1)}
.form-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:12px}

/* ── TABLE ── */
.table-wrap{overflow-x:auto;border-radius:12px;box-shadow:0 1px 3px rgba(0,0,0,.08)}
table{width:100%;border-collapse:collapse;background:#fff;font-size:13px}
thead tr{background:#0891B2;color:#fff}
thead th{padding:10px 10px;text-align:left;font-weight:600;white-space:nowrap;cursor:pointer;user-select:none}
thead th:hover{background:rgba(255,255,255,.1)}
tbody tr{border-bottom:1px solid #E5E7EB}
tbody tr:hover{background:#EFF6FF}
tbody td{padding:8px 10px;vertical-align:middle}

/* ── BADGES/PILLS ── */
.pill{display:inline-block;padding:2px 10px;border-radius:999px;font-size:11px;font-weight:600;white-space:nowrap}
.pill-green{background:#E6F9EE;color:#00B050}
.pill-red{background:#FDEDEC;color:#E74C3C}
.pill-blue{background:#E0F2FE;color:#0891B2}
.pill-purple{background:#F5F3FF;color:#7C3AED}
.pill-orange{background:#FDF2E9;color:#ED7D31}
.pill-gray{background:#F5F5F5;color:#808080}

/* ── KPI ── */
.kpi-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:12px;margin-bottom:16px}
.kpi{background:#fff;border-radius:12px;padding:16px;text-align:center;box-shadow:0 1px 3px rgba(0,0,0,.08);cursor:pointer;border-top:4px solid #ccc}
.kpi-value{font-size:28px;font-weight:700}
.kpi-label{font-size:12px;color:#6B7280;margin-top:4px}
.kpi-sub{font-size:11px;color:#9CA3AF;margin-top:2px}

/* ── MODAL ── */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:1000;display:flex;align-items:center;justify-content:center;padding:16px}
.modal{background:#fff;border-radius:14px;padding:24px;width:100%;max-width:800px;max-height:90vh;overflow-y:auto;box-shadow:0 8px 40px rgba(0,0,0,.25)}
.modal-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
.modal-title{font-size:16px;font-weight:700}
.modal-close{background:none;border:none;font-size:24px;cursor:pointer;color:#9CA3AF;line-height:1}

/* ── TOAST ── */
#toast{position:fixed;top:20px;left:50%;transform:translateX(-50%);z-index:9999;padding:12px 24px;border-radius:12px;font-size:14px;font-weight:700;color:#fff;box-shadow:0 4px 24px rgba(0,0,0,.25);white-space:nowrap;max-width:90vw;text-align:center;display:none;pointer-events:none}

/* ── LOGIN ── */
#login-screen{min-height:100vh;background:linear-gradient(135deg,#0F172A 0%,#0891B2 60%,#0F172A 100%);display:flex;align-items:center;justify-content:center;padding:16px}
.login-card{background:#fff;border-radius:20px;padding:40px 36px;width:100%;max-width:380px;text-align:center;box-shadow:0 8px 40px rgba(0,0,0,.3)}
.login-icon{font-size:48px;margin-bottom:8px}
.login-title{font-size:22px;font-weight:700;margin-bottom:4px}
.login-sub{font-size:13px;color:#6B7280;margin-bottom:28px}
.login-error{background:#FEF2F2;color:#B91C1C;border-radius:8px;padding:8px 12px;font-size:13px;margin-bottom:12px;text-align:left}
.login-btn{width:100%;padding:12px;background:#0891B2;color:#fff;border:none;border-radius:10px;font-size:15px;font-weight:700;cursor:pointer}
.login-btn:disabled{background:#9CA3AF;cursor:not-allowed}

/* ── LOADING ── */
#loading-screen{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;font-family:sans-serif;color:#6B7280}
.spinner{width:40px;height:40px;border:3px solid #E5E7EB;border-top-color:#0891B2;border-radius:50%;animation:spin 1s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── PERMISSIONS LOCK ── */
.read-only-notice{background:#FEF3C7;color:#92400E;border-radius:8px;padding:8px 12px;font-size:12px;margin-bottom:12px}

/* ── MOBILE NAV ── */
@media(max-width:600px){
  .desktop-only{display:none!important}
  #main{padding:12px;padding-bottom:70px}
  .form-grid{grid-template-columns:1fr 1fr}
}
#mobile-nav{display:none;position:fixed;bottom:0;left:0;right:0;background:#0F172A;z-index:100;box-shadow:0 -2px 12px rgba(0,0,0,.2);padding-bottom:env(safe-area-inset-bottom)}
@media(max-width:600px){#mobile-nav{display:flex}#nav{display:none}}
.mobile-nav-btn{flex:1;background:none;border:none;border-top:3px solid transparent;color:rgba(255,255,255,.5);padding:6px 2px;font-size:8px;font-weight:600;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:2px}
.mobile-nav-btn.active{color:#fff;border-top-color:#0891B2}
.mobile-nav-btn span{font-size:18px}

/* ── PRINT ── */
@media print{#nav,#mobile-nav,.no-print{display:none!important}body{background:#fff}}

/* ── MISC ── */
.text-muted{color:#9CA3AF;font-size:12px}
.text-sm{font-size:12px}
.mb-0{margin-bottom:0}
.flex{display:flex}
.flex-wrap{flex-wrap:wrap}
.gap-8{gap:8px}
.gap-12{gap:12px}
.items-center{align-items:center}
.justify-between{justify-content:space-between}
.ml-auto{margin-left:auto}
.hidden{display:none}
.nc{color:#E74C3C;font-weight:700;font-size:11px}
</style>
</head>

<script>
// ════════════════════════════════════════════════
// CONFIG
// ════════════════════════════════════════════════
var SUPABASE_URL = "https://jymobewqenhcjtzniytb.supabase.co";
var SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imp5bW9iZXdxZW5oY2p0em5peXRiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY2MjQ5NTEsImV4cCI6MjA5MjIwMDk1MX0.CpqOnvJ4YtsYHw6fSE7Xyj5MOXkXx-gBwT69J0F46p0";
var ADMIN_EMAIL = "a.avonde@allianceautomotive.fr";

// ════════════════════════════════════════════════
// STATE
// ════════════════════════════════════════════════
var state = {
  user: null,
  badges: [],
  casiers: [],
  wdCache: null,
  histo: [],
  msRows: [],
  settings: {
    restaurantEmail: "placedeseine@11h59.fr",
    ccEmails: "a.avonde@allianceautomotive.fr,ju.poitier@allianceautomotive.fr"
  },
  currentView: "accueil",
  sortCol: "",
  sortDir: "asc"
};

var sb = null;

// ════════════════════════════════════════════════
// HELPERS
// ════════════════════════════════════════════════
function fmt(d) { return d ? new Date(d + "T00:00:00").toLocaleDateString("fr-FR") : "—"; }
function todayISO() { return new Date().toISOString().slice(0, 10); }
function TS() { return new Date().toLocaleString("fr-FR", {day:"2-digit",month:"2-digit",year:"numeric",hour:"2-digit",minute:"2-digit"}); }
function nxId(arr) { return arr.reduce(function(m,x){ return Math.max(m, x.id||0); }, 0) + 1; }
function escHtml(s) { return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;"); }
function nextFriday() { var d=new Date(); d.setDate(d.getDate()+(d.getDay()<=5?5-d.getDay():6)); return d.toLocaleDateString("fr-FR"); }
function weekKey(d) { if(!d) return null; var dt=new Date(d+"T00:00:00"),mon=new Date(dt); mon.setDate(dt.getDate()-dt.getDay()+1); var sun=new Date(mon); sun.setDate(mon.getDate()+6); return mon.toLocaleDateString("fr-FR")+" → "+sun.toLocaleDateString("fr-FR"); }
function xlsxDateToISO(n) { if(!n||isNaN(n)) return ""; try { return new Date(Math.round((n-25569)*86400000)).toISOString().slice(0,10); } catch(e){ return ""; } }

async function sha256(str) {
  var buf = await crypto.subtle.digest("SHA-256", new TextEncoder().encode(str));
  return Array.from(new Uint8Array(buf)).map(function(b){ return b.toString(16).padStart(2,"0"); }).join("");
}

function isAdmin() { return state.user && (state.user.role === "admin" || state.user.email === ADMIN_EMAIL); }
function getPerm(onglet, perm) {
  if (isAdmin()) return true;
  var p = state.user && state.user.permissions && state.user.permissions[onglet];
  return p ? !!p[perm] : (perm === "voir");
}

// ════════════════════════════════════════════════
// TOAST
// ════════════════════════════════════════════════
var toastTimer = null;
function showToast(msg, type) {
  var el = document.getElementById("toast");
  el.style.background = type === "err" ? "#dc2626" : "#16a34a";
  el.textContent = msg;
  el.style.display = "block";
  if (toastTimer) clearTimeout(toastTimer);
  toastTimer = setTimeout(function(){ el.style.display = "none"; }, 3500);
}

// ════════════════════════════════════════════════
// MODAL
// ════════════════════════════════════════════════
function openModal(title, html) {
  document.getElementById("modal-title").textContent = title;
  document.getElementById("modal-body").innerHTML = html;
  document.getElementById("modal-overlay").classList.remove("hidden");
}
function closeModal() { document.getElementById("modal-overlay").classList.add("hidden"); }

// ════════════════════════════════════════════════
// ADDLOG
// ════════════════════════════════════════════════
function addLog(action, detail) {
  state.histo.unshift({ id: Date.now(), ts: TS(), action: action, detail: detail });
  if (state.histo.length > 300) state.histo.pop();
}

// ════════════════════════════════════════════════
// SUPABASE FETCH (sans lib externe)
// ════════════════════════════════════════════════
async function sbFetch(path, method, body) {
  var m = method || "GET";
  var headers = {
    "apikey": SUPABASE_KEY,
    "Authorization": "Bearer " + SUPABASE_KEY,
    "Content-Type": "application/json",
    "Accept": "application/json"
  };
  if (m !== "GET" && m !== "DELETE") {
    headers["Prefer"] = "return=representation";
  }
  var opts = { method: m, headers: headers };
  if (body) opts.body = JSON.stringify(body);
  var res = await fetch(SUPABASE_URL + "/rest/v1/" + path, opts);
  if (!res.ok) {
    var err = await res.text();
    throw new Error("Erreur " + res.status + ": " + err);
  }
  var text = await res.text();
  return text ? JSON.parse(text) : [];
}

async function sbSelect(table, filters) {
  var q = table + "?select=*";
  if (filters) q += "&" + filters;
  return sbFetch(q);
}

async function sbInsert(table, data) {
  return sbFetch(table, "POST", data);
}

async function sbUpsert(table, data) {
  return sbFetch(table + "?on_conflict=id", "POST", data);
}

async function sbUpdate(table, filter, data) {
  return sbFetch(table + "?" + filter, "PATCH", data);
}

async function sbDelete(table, filter) {
  return sbFetch(table + "?" + filter, "DELETE");
}

// ════════════════════════════════════════════════
// AUTH
// ════════════════════════════════════════════════
async function doLogin() {
  var email = document.getElementById("login-email").value.trim().toLowerCase();
  var pwd = document.getElementById("login-pwd").value;
  var errEl = document.getElementById("login-error");
  var btn = document.getElementById("login-btn");

  if (!email || !pwd) { errEl.textContent = "Veuillez remplir tous les champs."; errEl.style.display = "block"; return; }

  btn.disabled = true;
  btn.textContent = "Connexion...";
  errEl.style.display = "none";

  try {
    var hash = await sha256(pwd);
    // Vérifier d'abord si l'email existe
    var allData = await sbFetch("lp24_users?select=email,pwd_hash&email=eq." + encodeURIComponent(email), "GET");
    if (!allData || allData.length === 0) {
      errEl.textContent = "Aucun compte trouvé pour cet email.";
      errEl.style.display = "block";
      btn.disabled = false; btn.textContent = "Se connecter"; return;
    }
    // Vérifier le mot de passe
    var data = await sbFetch("lp24_users?select=*&email=eq." + encodeURIComponent(email) + "&pwd_hash=eq." + hash, "GET");
    if (!data || data.length === 0) {
      errEl.textContent = "Mot de passe incorrect. Hash attendu: " + allData[0].pwd_hash.substring(0,16) + "...";
      errEl.style.display = "block";
    } else {
      var user = data[0];
      try { localStorage.setItem("lp24_session", JSON.stringify({ id: user.id, email: user.email, nom: user.nom, role: user.role, permissions: user.permissions, ts: Date.now() })); } catch(e){}
      try { await sbUpdate("lp24_users", "id=eq." + user.id, { last_login: todayISO() }); } catch(e){}
      startSession(user);
    }
  } catch(e) {
    errEl.textContent = "Erreur : " + e.message;
    errEl.style.display = "block";
  }

  btn.disabled = false;
  btn.textContent = "Se connecter";
}

document.addEventListener("DOMContentLoaded", function() {
  document.getElementById("login-pwd").addEventListener("keydown", function(e) {
    if (e.key === "Enter") doLogin();
  });
  document.getElementById("login-email").addEventListener("keydown", function(e) {
    if (e.key === "Enter") document.getElementById("login-pwd").focus();
  });
});

function logout() {
  try { localStorage.removeItem("lp24_session"); } catch(e){}
  state.user = null; state.badges = []; state.casiers = [];
  document.getElementById("app").style.display = "none";
  document.getElementById("login-screen").style.display = "flex";
}

// ════════════════════════════════════════════════
// SESSION + INIT
// ════════════════════════════════════════════════
async function startSession(user) {
  state.user = user;
  document.getElementById("login-screen").style.display = "none";
  document.getElementById("loading-screen").style.display = "flex";

  // Charger les données
  try {
    var results = await Promise.all([
      sbFetch("lp24_badges?select=*&order=id"),
      sbFetch("lp24_casiers?select=*&order=id")
    ]);
    state.badges = results[0] || [];
    state.casiers = results[1] || [];
  } catch(e) {
    console.warn("Erreur chargement:", e.message);
  }

  document.getElementById("loading-screen").style.display = "none";
  document.getElementById("app").style.display = "block";

  // Mettre à jour UI utilisateur
  document.getElementById("user-nom").textContent = user.nom;
  document.getElementById("user-role").textContent = isAdmin() ? "👑 Admin" : "👤 Utilisateur";

  buildNav();
  showView("accueil");
}

async function init() {
  // Vérifier session sauvegardée
  try {
    var sess = localStorage.getItem("lp24_session");
    if (sess) {
      var data = JSON.parse(sess);
      if (data && data.ts && Date.now() - data.ts < 7 * 24 * 3600 * 1000) {
        await startSession(data);
        return;
      }
    }
  } catch(e){}

  document.getElementById("loading-screen").style.display = "none";
  document.getElementById("login-screen").style.display = "flex";
}

// ════════════════════════════════════════════════
// NAVIGATION
// ════════════════════════════════════════════════
var NAV_ITEMS = [
  { id: "accueil", label: "Accueil", icon: "🏠" },
  { id: "collaborateurs", label: "Collaborateurs", icon: "👥" },
  { id: "casiers", label: "Casiers", icon: "📦" },

function buildNav() {
  var html = "";
  NAV_ITEMS.forEach(function(n) {
    if (n.adminOnly && !isAdmin()) return;
    html += '<button class="nav-btn" data-view="' + n.id + '" onclick="showView(\'' + n.id + '\')">' + n.icon + ' ' + n.label + '</button>';
  });
  // Toolbar admin
  if (isAdmin()) {
    html += '<div style="margin-left:8px;display:flex;gap:4px;align-items:center;border-left:1px solid rgba(255,255,255,.2);padding-left:8px">';
    html += '<label title="Import Racine Commune" style="cursor:pointer;background:none;border:1px solid rgba(255,255,255,.3);border-radius:6px;padding:4px 8px;color:#fff;font-size:13px">📂<input type="file" accept=".xlsx,.xls" onchange="importRacine(this)" style="display:none"></label>';
    html += '<label title="Import Workday HR" style="cursor:pointer;background:none;border:1px solid rgba(255,255,255,.3);border-radius:6px;padding:4px 8px;color:#fff;font-size:13px">👤<input type="file" accept=".xlsx,.xls" onchange="importWD(this,\'hr\')" style="display:none"></label>';
    html += '<label title="Import Future Hires" style="cursor:pointer;background:none;border:1px solid rgba(255,255,255,.3);border-radius:6px;padding:4px 8px;color:#fff;font-size:13px">🔮<input type="file" accept=".xlsx,.xls" onchange="importWD(this,\'fh\')" style="display:none"></label>';
    html += '<button title="Sync dates Workday" onclick="syncDatesWD()" style="background:none;border:1px solid rgba(255,255,255,.3);border-radius:6px;padding:4px 8px;color:#fff;font-size:13px">📅</button>';
    html += '<button title="Export JSON" onclick="exportJSON()" style="background:none;border:1px solid rgba(255,255,255,.3);border-radius:6px;padding:4px 8px;color:#fff;font-size:13px">⬇️</button>';
    html += '<label title="Import JSON" style="cursor:pointer;background:none;border:1px solid rgba(255,255,255,.3);border-radius:6px;padding:4px 8px;color:#fff;font-size:13px">⬆️<input type="file" accept=".json" onchange="importJSON(this)" style="display:none"></label>';
    html += '<button title="Paramètres" onclick="showSettings()" style="background:none;border:1px solid rgba(255,255,255,.3);border-radius:6px;padding:4px 8px;color:#fff;font-size:13px">⚙️</button>';
    html += '</div>';
  }
  document.getElementById("nav-tabs").innerHTML = html;
}

function showView(id) {
  state.currentView = id;
  NAV_ITEMS.forEach(function(n) {
    var btns = document.querySelectorAll('[data-view="' + n.id + '"]');
    btns.forEach(function(b){ b.classList.toggle("active", n.id === id); });
  });
  document.querySelectorAll('[id^="view-"]').forEach(function(el){ el.style.display = "none"; });
  var container = document.getElementById("view-" + id);
  if (container) {
    container.style.display = "block";
    renderView(id, container);
  }
}

function renderView(id, container) {
  switch(id) {
    case "accueil": renderAccueil(container); break;
    case "collaborateurs": renderCollaborateurs(container); break;
    case "casiers": renderCasiers(container); break;
    case "rapport": renderRapport(container); break;
    case "lists": renderMSLists(container); break;
    case "impression": renderImpression(container); break;
    case "historique": renderHistorique(container); break;
    case "archives": renderArchives(container); break;
    case "utilisateurs": renderUtilisateurs(container); break;
  }
}

function enrDep() {
  var nom = document.getElementById("dep-nom").value.trim().toUpperCase();
  var prenom = document.getElementById("dep-prenom").value.trim().toLowerCase();
  var date = document.getElementById("dep-date").value || todayISO();
  if (!nom && !prenom) { showToast("⚠️ Saisissez nom ou prénom","err"); return; }
  var c = state.badges.find(function(b){ return (!nom||b.nom.toUpperCase().includes(nom))&&(!prenom||b.prenom.toLowerCase().includes(prenom))&&b.statut!=="Archivé"; });
  if (!c) { showToast("⚠️ Collaborateur introuvable","err"); return; }
  c.date_sortie_prevue = date;
  sbUpdate("lp24_badges", "id=eq."+c.id, {date_sortie_prevue:date}).catch(function(){});
  addLog("Départ", c.prenom+" "+c.nom+" → "+date);
  showToast("✅ Départ enregistré : "+c.prenom+" "+c.nom);
  document.getElementById("dep-nom").value="";document.getElementById("dep-prenom").value="";document.getElementById("dep-date").value="";
}

function enrArr() {
  var nom = document.getElementById("arr-nom").value.trim().toUpperCase();
  var prenom = document.getElementById("arr-prenom").value.trim();
  if (!nom && !prenom) { showToast("⚠️ Saisissez nom ou prénom","err"); return; }
  var ex = state.badges.find(function(b){ return b.nom===nom&&b.prenom.toLowerCase()===prenom.toLowerCase()&&b.statut!=="Archivé"; });
  if (ex) { showToast("⚠️ Ce collaborateur existe déjà","err"); return; }
  var wd = state.wdCache ? Object.values(state.wdCache).find(function(w){ return w.nom===nom&&w.prenom.toLowerCase()===prenom.toLowerCase(); }) : null;
  var nb = {id:nxId(state.badges),nom:wd?wd.nom:nom,prenom:wd?wd.prenom:prenom,matricule:wd?wd.matricule:"",email:wd?wd.email:"",serie:"",zeplug:"",carte_rechargement:"",casier:"",manager:wd?wd.manager:"",mail_manager:wd?wd.mailMgr:"",statut:"Actif",date_sortie_prevue:"",date_archive:"",commentaire:""};
  state.badges.push(nb);
  var row = Object.assign({}, nb); delete row.id;
  sbInsert("lp24_badges", row).catch(function(){});
  addLog("Arrivée",(wd?"Workday":"Manuel")+" : "+nb.prenom+" "+nb.nom);
  showToast("✅ Arrivée : "+nb.prenom+" "+nb.nom);
  document.getElementById("arr-nom").value="";document.getElementById("arr-prenom").value="";
}

var collabFilter = { search:"", statut:"" };

function renderCollaborateurs(c) {
  var canMod = getPerm("collaborateurs","modifier");
  var canAdd = getPerm("collaborateurs","ajouter");
  var today = todayISO();
  var d7 = new Date(); d7.setDate(d7.getDate()+7); var d7ISO = d7.toISOString().slice(0,10);

  var filtered = state.badges.filter(function(b){
    if (!collabFilter.statut && b.statut==="Archivé") return false;
    if (collabFilter.statut && b.statut !== collabFilter.statut) return false;
    var q = collabFilter.search.toLowerCase();
    return !q || (b.nom+" "+b.prenom+" "+(b.matricule||"")+" "+(b.serie||"")).toLowerCase().includes(q);
  });

  if (state.sortCol) {
    filtered.sort(function(a,b){
      var av=a[state.sortCol]||"",bv=b[state.sortCol]||"";
      return state.sortDir==="asc"?String(av).localeCompare(String(bv)):String(bv).localeCompare(String(av));
    });
  }

  // Compter doublons badges
  var serieCount = {};
  state.badges.filter(function(b){ return b.serie&&b.statut!=="Archivé"; }).forEach(function(b){ serieCount[b.serie]=(serieCount[b.serie]||0)+1; });

  var statColors = {"Actif":"#00B050","À récupérer":"#E74C3C","Badge prêt":"#0891B2","Badge VIP":"#7C3AED","Futur arrivant":"#0891B2","Archivé":"#808080"};
  var statPills = {"Actif":"pill-green","À récupérer":"pill-red","Badge prêt":"pill-blue","Badge VIP":"pill-purple","Futur arrivant":"pill-blue","Archivé":"pill-gray"};

  var rows = filtered.map(function(b,i){
    var hasM = b.matricule && b.matricule!=="0";
    var doublon = b.serie && serieCount[b.serie]>1;
    var zone = b.casier?b.casier.substring(0,2):"";
    var zColors = {DE:"#2F5496",PA:"#ED7D31",SE:"#7C3AED",LV:"#00B050"};
    var zcol = zColors[zone]||"#6B7280";
    var sortieProche = b.date_sortie_prevue&&b.date_sortie_prevue<=d7ISO&&b.date_sortie_prevue>=today;
    var sortiePassee = b.date_sortie_prevue&&b.date_sortie_prevue<today&&b.statut==="Actif";
    var bg = b.statut==="Archivé"?"#F5F5F5":b.statut==="À récupérer"?"#FDEDEC":sortiePassee?"#FFF3CD":sortieProche?"#FFFBEB":b.statut==="Badge VIP"?"#F5F3FF":b.statut==="Badge prêt"?"#EFF6FF":i%2===0?"#fff":"#F9FAFB";
    var dateCell = b.statut!=="Archivé" ? (b.date_sortie_prevue
      ? '<input type="date" value="'+b.date_sortie_prevue+'" '+(canMod?'onchange="updateDateSortie('+b.id+',this.value)"':'readonly')
        +' style="font-size:11px;padding:3px;border-radius:4px;border:1px solid '+(sortieProche?"#ED7D31":"#86efac")+';background:'+(sortieProche?"#FFFBEB":"#f0fdf4")+';width:108px">'
      : (canMod?'<label style="cursor:pointer;font-size:13px;color:#9CA3AF;padding:2px 8px;border-radius:4px;border:1px dashed #D1D5DB;background:#F9FAFB">—<input type="date" style="position:absolute;opacity:0;width:0;height:0" onchange="updateDateSortie('+b.id+',this.value)"></label>':'<span style="color:#9CA3AF">—</span>'))
      : '<span style="font-size:11px;color:#9CA3AF">'+fmt(b.date_sortie_prevue)+'</span>';
    var actions = b.statut!=="Archivé" ? (canMod
      ? '<button class="btn-icon-only" onclick="editCollab('+b.id+')" title="Modifier">✏️</button><button class="btn-icon-only" onclick="archiverCollab('+b.id+')" title="Archiver">🗃️</button>'
      : '') : '<span style="font-size:10px;color:#9CA3AF">—</span>';
    return '<tr style="background:'+bg+'">'
      + '<td style="font-size:11px;color:#CBD5E1;text-align:center">'+(i+1)+'</td>'
      + '<td style="font-weight:700;font-size:11px;color:#0891B2">'+(hasM?escHtml(b.matricule):'<span class="nc">NC</span>')+'</td>'
      + '<td style="font-weight:600">'+escHtml(b.nom||"—")+'</td>'
      + '<td>'+escHtml(b.prenom||"—")+'</td>'
      + '<td>'+(b.serie?'<code style="background:'+(doublon?"#FEF3C7":"#F3F4F6")+';color:'+(doublon?"#92400E":"inherit")+';padding:1px 5px;border-radius:3px;font-size:10px;border:'+(doublon?"1px solid #F59E0B":"none")+'">'+escHtml(b.serie)+'</code>'+(doublon?'<span title="Doublon !"> ⚠️</span>':''):'—')+'</td>'
      + '<td style="font-size:10px;color:#6B7280">'+escHtml(b.carte_rechargement||"—")+'</td>'
      + '<td>'+(b.casier?'<span style="background:'+zcol+'22;color:'+zcol+';font-weight:700;padding:1px 5px;border-radius:4px;font-size:10px">'+escHtml(b.casier)+'</span>':'<span style="color:#9CA3AF">—</span>')+'</td>'
      + '<td>'+dateCell+'</td>'
      + '<td style="font-size:10px;max-width:100px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+escHtml(b.manager||"—")+'</td>'
      + '<td style="font-size:10px;color:#6B7280;max-width:100px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+escHtml(b.mail_manager||"—")+'</td>'
      + '<td><span class="pill '+statPills[b.statut]+'">'+escHtml(b.statut)+'</span></td>'
      + '<td style="white-space:nowrap"><button title="Arrivée→Restaurant" onclick="mailArrivee('+b.id+')" style="background:#EBF5FB;border:1px solid #AED6F1;border-radius:5px;cursor:pointer;font-size:12px;padding:2px 5px">🍽️</button> <button title="Départ→Restaurant" onclick="mailDepart('+b.id+')" style="background:#FDEDEC;border:1px solid #F1948A;border-radius:5px;cursor:pointer;font-size:12px;padding:2px 5px">🚪</button></td>'
      + '<td><div style="display:flex;gap:2px">'+actions+'</div></td>'
      + '</tr>';
  }).join("");

  function thSort(col, label) {
    var arrow = state.sortCol===col?(state.sortDir==="asc"?" ↑":" ↓"):"";
    return '<th onclick="sortCollab(\''+col+'\')" style="cursor:pointer">'+label+arrow+'</th>';
  }

  c.innerHTML = '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;flex-wrap:wrap;gap:8px">'
    + '<h1 style="font-size:22px;font-weight:700;color:#0891B2">👥 Collaborateurs ('+filtered.length+'/'+state.badges.filter(function(b){return b.statut!=="Archivé";}).length+')</h1>'
    + (canAdd?'<button class="btn btn-primary" onclick="newCollab()">+ Nouveau collaborateur</button>':'')
    + '</div>'
    + '<div class="card" style="padding:12px;margin-bottom:12px">'
    + '<div style="display:flex;gap:10px;flex-wrap:wrap;align-items:center">'
    + '<input class="form-control" style="max-width:220px" placeholder="🔍 Nom, matricule, badge..." value="'+escHtml(collabFilter.search)+'" oninput="collabFilter.search=this.value;renderView(\'collaborateurs\',document.getElementById(\'view-collaborateurs\'))">'
    + '<select class="form-control" style="max-width:180px" onchange="collabFilter.statut=this.value;renderView(\'collaborateurs\',document.getElementById(\'view-collaborateurs\'))">'
    + '<option value="" '+(collabFilter.statut===""?"selected":"")+'>Actifs (hors archivés)</option>'
    + '<option value="Actif" '+(collabFilter.statut==="Actif"?"selected":"")+'>Actif</option>'
    + '<option value="À récupérer" '+(collabFilter.statut==="À récupérer"?"selected":"")+'>À récupérer</option>'
    + '<option value="Badge prêt" '+(collabFilter.statut==="Badge prêt"?"selected":"")+'>Badge prêt</option>'
    + '<option value="Badge VIP" '+(collabFilter.statut==="Badge VIP"?"selected":"")+'>Badge VIP</option>'
    + '<option value="Futur arrivant" '+(collabFilter.statut==="Futur arrivant"?"selected":"")+'>Futur arrivant</option>'
    + '<option value="Archivé" '+(collabFilter.statut==="Archivé"?"selected":"")+'>Archivés</option>'
    + '</select>'
    + (collabFilter.search||collabFilter.statut?'<button class="btn btn-outline btn-sm" onclick="collabFilter.search=\'\';collabFilter.statut=\'\';renderView(\'collaborateurs\',document.getElementById(\'view-collaborateurs\'))">✕ Effacer</button>':'')
    + '<span style="font-size:12px;color:#9CA3AF;margin-left:auto">'+filtered.length+' collaborateur(s)</span>'
    + '</div></div>'
    + '<div class="table-wrap"><table>'
    + '<thead><tr><th>#</th>'+thSort("matricule","Matricule")+thSort("nom","Nom")+thSort("prenom","Prénom")+thSort("serie","N° Badge")+'<th>Carte recharg.</th>'+thSort("casier","Casier")+thSort("date_sortie_prevue","Date sortie")+thSort("manager","Manager")+'<th>Email Mgr</th>'+thSort("statut","Statut")+'<th>Mail</th><th>Actions</th></tr></thead>'
    + '<tbody>'+(rows||'<tr><td colspan="13" style="text-align:center;padding:32px;color:#9CA3AF">Aucun collaborateur.</td></tr>')+'</tbody>'
    + '</table></div>';
}

function sortCollab(col) {
  if (state.sortCol===col) state.sortDir=state.sortDir==="asc"?"desc":"asc";
  else { state.sortCol=col; state.sortDir="asc"; }
  renderView("collaborateurs", document.getElementById("view-collaborateurs"));
}

function updateDateSortie(id, val) {
  var b = state.badges.find(function(x){ return x.id===id; });
  if (!b||!val) return;
  b.date_sortie_prevue = val;
  sbUpdate("lp24_badges","id=eq."+id,{date_sortie_prevue:val}).catch(function(){});
  addLog("Date sortie",b.prenom+" "+b.nom+" → "+val);
  showToast("✅ Date mise à jour");
}

function mailArrivee(id) {
  var b = state.badges.find(function(x){ return x.id===id; });
  if (!b) return;

async function saveCollab(id) {
  var nom = document.getElementById("cf-nom").value.trim().toUpperCase();
  if (!nom) { showToast("⚠️ Le nom est obligatoire","err"); return; }
  var serie = document.getElementById("cf-serie").value.trim();
  if (serie) {
    var autre = state.badges.find(function(b){ return b.serie===serie&&b.id!==id&&b.statut!=="Archivé"; });
    if (autre && !confirm("⚠️ Badge N°"+serie+" déjà attribué à "+autre.prenom+" "+autre.nom+". Continuer ?")) return;
  }
  var data = {
    nom:nom, prenom:document.getElementById("cf-prenom").value.trim(),
    matricule:document.getElementById("cf-mat").value.trim(),
    email:document.getElementById("cf-email").value.trim(),
    serie:serie, carte_rechargement:document.getElementById("cf-carte").value.trim(),
    casier:document.getElementById("cf-casier").value,
    statut:document.getElementById("cf-statut").value,
    date_sortie_prevue:document.getElementById("cf-date").value,
    manager:document.getElementById("cf-manager").value.trim(),
    mail_manager:document.getElementById("cf-mailmgr").value.trim(),
    commentaire:document.getElementById("cf-comment").value.trim()
  };
  if (id) {
    var b = state.badges.find(function(x){ return x.id===id; });
    Object.assign(b, data);
    await sbUpdate("lp24_badges","id=eq."+id,data).catch(function(){});
    addLog("Modification",data.prenom+" "+data.nom);
    showToast("✅ Collaborateur mis à jour");
  } else {
    data.id = nxId(state.badges); data.date_archive="";
    state.badges.push(data);
    var row = Object.assign({},data); delete row.id;
    await sbInsert("lp24_badges",row).catch(function(){});
    addLog("Ajout",data.prenom+" "+data.nom);
    showToast("✅ Collaborateur ajouté");
  }
  closeModal();
  renderView("collaborateurs",document.getElementById("view-collaborateurs"));
}

async function archiverCollab(id) {
  if (!confirm("Archiver ce collaborateur ?")) return;
  var b = state.badges.find(function(x){ return x.id===id; });

function loadMSListsCSV(input) {
  var file=input.files[0];if(!file)return;
  var r=new FileReader();
  r.onload=function(e){
    var text=e.target.result,lines=text.split(/\r?\n/);if(lines.length<2)return;
    var sep=lines[0].includes(";")?";":",";
    var parseLine=function(line){var cols=[],cur=[],inQ=false;for(var i=0;i<line.length;i++){var ch=line[i];if(ch==='"')inQ=!inQ;else if(ch===sep&&!inQ){cols.push(cur.join("").replace(/^"|"$/g,"").trim());cur=[];}else cur.push(ch);}cols.push(cur.join("").replace(/^"|"$/g,"").trim());return cols;};
    var headers=parseLine(lines[0]);
    state.msRows=lines.slice(1).filter(function(l){return l.trim();}).map(function(line,idx){var cols=parseLine(line),o={_idx:idx,_done:false};headers.forEach(function(h,i){o[h]=cols[i]||"";});return o;});
    showToast("✅ "+state.msRows.length+" lignes chargées");
    renderView("lists",document.getElementById("view-lists"));
  };
  r.readAsText(file,"UTF-8");
  input.value="";
}

async function saveUser(id) {
  var nom=document.getElementById("uf-nom").value.trim();
  var email=document.getElementById("uf-email").value.trim().toLowerCase();
  var pwd=document.getElementById("uf-pwd").value;
  var role=document.getElementById("uf-role").value;
  if(!nom||!email){showToast("⚠️ Nom et email obligatoires","err");return;}
  if(!id&&!pwd){showToast("⚠️ Mot de passe obligatoire","err");return;}
  // Collecter permissions
  var perms={};
  document.querySelectorAll(".perm-check").forEach(function(cb){
    var o=cb.dataset.onglet,p=cb.dataset.perm;
    if(!perms[o])perms[o]={};
    perms[o][p]=cb.checked;
  });
  var data={nom:nom,email:email,role:role,permissions:role==="admin"?null:perms};
  if(pwd){data.pwd_hash=await sha256(pwd);}
  try{
    if(id){await sbUpdate("lp24_users","id=eq."+id,data);}
    else{await sbInsert("lp24_users",data);}
    showToast(id?"✅ Utilisateur mis à jour":"✅ Utilisateur créé");
    closeModal();
    renderView("utilisateurs",document.getElementById("view-utilisateurs"));
  }catch(e){showToast("⚠️ Erreur : "+e.message,"err");}
}

function importRacine(input) {
  var file=input.files[0];if(!file)return;input.value="";
  if(typeof XLSX==="undefined"){showToast("⚠️ XLSX non chargé","err");return;}
  var reader=new FileReader();
  reader.onload=function(e){
    try{
      var wb=XLSX.read(e.target.result,{type:"binary"});
      var sheets=wb.SheetNames,newBadges=[],newCasiers=[],id=nxId(state.badges)+1,cid=1;
      var isV1=sheets.includes("LP 24");
      var getVal=function(v){if(v==null)return"";if(typeof v==="object"&&v.v!=null)return String(v.v);var s=String(v).trim();return s.startsWith("=")?"":s;};
      if(isV1){
        var ws=wb.Sheets["LP 24"];if(!ws){showToast("⚠️ Feuille 'LP 24' introuvable","err");return;}
        var rows=XLSX.utils.sheet_to_json(ws,{header:1,defval:""});
        for(var i=1;i<rows.length;i++){
          var r=rows[i];if(!r||r.length<4)continue;
          var nom=getVal(r[4]).toUpperCase(),prenom=getVal(r[5]);
          if(!nom&&!prenom)continue;if(nom.startsWith("="))continue;
          var ds=r[0],dsNum=typeof ds==="number"?ds:parseFloat(ds);
          var actif=ds==null||ds===""||ds===0||(typeof ds==="string"&&(ds.includes("N/A")||ds.trim()==="0"))||(!isNaN(dsNum)&&dsNum<1000);
          newBadges.push({id:id++,matricule:getVal(r[2]),nom:nom,prenom:prenom,email:getVal(r[7]),serie:getVal(r[9]),zeplug:getVal(r[10]),carte_rechargement:getVal(r[10]),casier:getVal(r[11]),manager:getVal(r[13]),mail_manager:getVal(r[12]),statut:actif?"Actif":"À récupérer",date_sortie_prevue:"",date_archive:"",commentaire:""});
        }
      }
      if(!newBadges.length){showToast("⚠️ Aucun collaborateur trouvé","err");return;}
      var archives=state.badges.filter(function(b){return b.statut==="Archivé";});
      state.badges=[].concat(newBadges,archives);
      sbDelete("lp24_badges","id=neq.0").then(function(){
        var rows2=state.badges.map(function(b){var r=Object.assign({},b);delete r.id;return r;});
        if(rows2.length)sbInsert("lp24_badges",rows2).catch(function(){});
      }).catch(function(){});
      addLog("Import Racine",file.name+" — "+newBadges.length+" collaborateurs");
      showToast("✅ "+newBadges.filter(function(b){return b.statut==="Actif";}).length+" actifs · "+newBadges.filter(function(b){return b.statut==="À récupérer";}).length+" à récupérer");
      if(state.currentView==="collaborateurs")renderView("collaborateurs",document.getElementById("view-collaborateurs"));
      else if(state.currentView==="accueil")renderView("accueil",document.getElementById("view-accueil"));
    }catch(err){showToast("⚠️ Erreur import : "+err.message,"err");}
  };
  reader.readAsBinaryString(file);
}

function importWD(input,type){
  var file=input.files[0];if(!file)return;input.value="";
  if(typeof XLSX==="undefined"){showToast("⚠️ XLSX non chargé","err");return;}
  var reader=new FileReader();
  reader.onload=function(e){
    try{
      var wb=XLSX.read(e.target.result,{type:"binary"});
      var wsName=wb.SheetNames[0];
      var ws=wb.Sheets[wsName];
      var keys=Object.keys(ws).filter(function(k){return!k.startsWith("!");});
      if(keys.length>0){var maxR=0,maxC=0;keys.forEach(function(a){try{var d=XLSX.utils.decode_cell(a);if(d.r>maxR)maxR=d.r;if(d.c>maxC)maxC=d.c;}catch(e){}});ws["!ref"]=XLSX.utils.encode_range({s:{r:0,c:0},e:{r:maxR,c:maxC}});}
      var data=XLSX.utils.sheet_to_json(ws,{header:1,defval:""});
      var hRow=-1;
      for(var i=0;i<Math.min(data.length,30);i++){if(data[i].some(function(v){return String(v||"").toLowerCase().trim()==="employee id";})){hRow=i;break;}}
      if(hRow<0){showToast("⚠️ 'Employee ID' introuvable","err");return;}
      var headers=data[hRow].map(function(h){return String(h||"").trim();});
      var parsed=[];
      data.slice(hRow+1).forEach(function(r){
        var o={};headers.forEach(function(h,i){if(h)o[h]=r[i]!=null?r[i]:"";});
        var mat=String(o["Employee ID"]||"").trim(),nom=String(o["Preferred Name - Last Name"]||"").trim().toUpperCase(),prenom=String(o["Preferred Name - First Name"]||"").trim();
        if(!mat||!nom)return;
        var toISO=function(v){if(!v||v==="")return"";if(typeof v==="number")return xlsxDateToISO(v);var s=String(v).trim();if(!s||s==="NaN")return"";var dm=s.match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})/);if(dm)return dm[3]+"-"+dm[2].padStart(2,"0")+"-"+dm[1].padStart(2,"0");if(/^\d{4}-\d{2}-\d{2}/.test(s))return s.slice(0,10);return"";};
        parsed.push({matricule:mat,nom:nom,prenom:prenom,email:String(o["Email - Primary Work"]||o["Work Email"]||"").trim(),manager:String(o["Manager's Name"]||o["Manager"]||"").trim(),mailMgr:String(o["Manager e-mail"]||o["Manager's Email"]||"").trim(),hireDate:toISO(o["Hire Date"]),termDate:toISO(o["Termination Date"])});
      });
      if(!parsed.length){showToast("⚠️ Aucune donnée valide","err");return;}
      if(!state.wdCache)state.wdCache={};
      parsed.forEach(function(p){state.wdCache[p.matricule]=p;});
      addLog("Import Workday "+(type==="hr"?"HR":"FH"),parsed.length+" entrées");
      showToast("✅ "+parsed.length+" chargés ("+(type==="hr"?"HR Data":"Future Hires")+")");
    }catch(err){showToast("⚠️ Erreur : "+err.message,"err");}
  };
  reader.readAsBinaryString(file);
}

function syncDatesWD(){
  if(!state.wdCache){showToast("⚠️ Workday non chargé","err");return;}
  var count=0;
  state.badges.forEach(function(b){
    if(!b.matricule||b.matricule==="0"||b.statut==="Archivé")return;
    var wd=state.wdCache[String(b.matricule)];if(!wd)return;
    var td=wd.termDate||"",hd=wd.hireDate||"",ds=(td&&(!hd||td>hd))?td:"";
    if(ds&&!b.date_sortie_prevue){count++;b.date_sortie_prevue=ds;sbUpdate("lp24_badges","id=eq."+b.id,{date_sortie_prevue:ds}).catch(function(){});}
  });
  addLog("Sync Workday",count+" date(s) mises à jour");
  showToast("✅ "+count+" date(s) synchronisées");
}

      state.badges=b;state.casiers=cs;if(wd)state.wdCache=wd;if(mlr.length)state.msRows=mlr;
      sbDelete("lp24_badges","id=neq.0").then(function(){if(b.length)sbInsert("lp24_badges",b.map(function(x){var r=Object.assign({},x);delete r.id;return r;})).catch(function(){});}).catch(function(){});
      sbDelete("lp24_casiers","id=neq.0").then(function(){if(cs.length)sbInsert("lp24_casiers",cs.map(function(x){var r=Object.assign({},x);delete r.id;return r;})).catch(function(){});}).catch(function(){});
      addLog("Import JSON",b.length+" collaborateurs"+(wd?" + Workday":""));
      showToast("✅ "+b.length+" collaborateurs importés"+(wd?" + Workday":""));
      renderView(state.currentView,document.getElementById("view-"+state.currentView));
    }catch(err){showToast("⚠️ Erreur : "+err.message,"err");}
  };
  r.readAsText(file);
}

function showSettings(){

function saveSettings(){
  state.settings.restaurantEmail=document.getElementById("s-email").value.trim();

  showToast("✅ Paramètres enregistrés");

}
