// ── Parse Workday (HR Data / Future Hires) ──
function parseWDFileAsync(file,type,wdCache,setWdCache,showToast,setLoading){
  setLoading(true);
  const reader=new FileReader();
  reader.onload=e=>{
    try{
      const wb=XLSX.read(e.target.result,{type:"binary"});
      let wsName=wb.SheetNames[0];
      const wdTab=wb.SheetNames.find(s=>s.toLowerCase().includes("workday"));
      if(wdTab)wsName=wdTab;
      const ws=wb.Sheets[wsName];
      // Fix dimension A1:A1
      const cellKeys=Object.keys(ws).filter(k=>!k.startsWith("!"));
      if(cellKeys.length>0){
        let maxR=0,maxC=0;
        cellKeys.forEach(addr=>{try{const d=XLSX.utils.decode_cell(addr);if(d.r>maxR)maxR=d.r;if(d.c>maxC)maxC=d.c;}catch(e){}});
        ws["!ref"]=XLSX.utils.encode_range({s:{r:0,c:0},e:{r:maxR,c:maxC}});
      }
      const data=XLSX.utils.sheet_to_json(ws,{header:1,defval:""});
      let hRow=-1;
      for(let i=0;i<Math.min(data.length,30);i++){
        const row=data[i];
        if(!Array.isArray(row)||!row.length)continue;
        if(row.some(v=>String(v||"").toLowerCase().replace(/\s+/g," ").trim()==="employee id")){hRow=i;break;}
      }
      if(hRow<0){
        const preview=data.slice(0,5).map((r,i)=>i+": "+JSON.stringify(r).slice(0,80)).join("\n");
        alert("Colonne 'Employee ID' introuvable.\nFichier: "+file.name+"\n\nContenu:\n"+preview);
        setLoading(false);return;
      }
      const headers=data[hRow].map(h=>String(h||"").trim());
      const rows=data.slice(hRow+1).filter(r=>Array.isArray(r)&&r.some(v=>v!==""&&v!==null));
      const parsed=[];
      rows.forEach(r=>{
        const o={};headers.forEach((h,i)=>{if(h)o[h]=r[i]!==undefined&&r[i]!==null?r[i]:"";});
        const mat=String(o["Employee ID"]||"").trim();
        const nom=norm(String(o["Preferred Name - Last Name"]||""));
        const prenom=String(o["Preferred Name - First Name"]||"").trim();
        if(!mat||!nom)return;
        const toISO=v=>{if(!v||v==="")return"";if(typeof v==="number")return xlsxDateToISO(v);const s=String(v).trim();if(!s||s==="NaN")return"";const dm=s.match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})/);if(dm)return dm[3]+"-"+dm[2].padStart(2,"0")+"-"+dm[1].padStart(2,"0");if(s.match(/^\d{4}-\d{2}-\d{2}/))return s.slice(0,10);try{const d=new Date(s);if(!isNaN(d))return d.toISOString().slice(0,10);}catch{}return"";};
        // Colonne G (index 6) = YES → collaborateur toujours en poste, ignorer colonne F (Termination Date)
        const colG=String(r[6]||"").trim().toUpperCase();
        const colGisYes=colG==="YES";
        const inCoFromHeader=norm(String(o["In Company"]||o["Still Employed"]||""))==="YES";
        const inCo=inCoFromHeader||colGisYes;
        const termDate=inCo?"":toISO(o["Termination Date"]);
        parsed.push({matricule:mat,nom,prenom,workerType:String(o["Worker Type"]||"").trim(),actif:String(o["Active Status"]||"").trim(),location:String(o["Location"]||"").trim(),email:String(o["Email - Primary Work"]||o["Work Email"]||"").trim(),manager:norm(String(o["Manager's Name"]||o["Manager"]||"")),mailMgr:String(o["Manager e-mail"]||o["Manager's Email"]||"").trim(),hireDate:toISO(o["Hire Date"]),termDate,inCo,source:type});
      });
      if(!parsed.length){alert("Aucune donnée valide.");setLoading(false);return;}
      setWdCache(prev=>{const next={...(prev||{})};parsed.forEach(p=>{next[p.matricule]=p;});return next;});
      // Mettre à jour les badges existants sans matricule et les marquer comme "nouveaux"
      if(typeof window._onWdImport==="function")window._onWdImport(parsed);
      setLoading(false);
      showToast("✅ "+parsed.length+" collaborateurs chargés ("+(type==="hr"?"HR Data":"Future Hires")+")");
    }catch(err){alert("Erreur : "+err.message);setLoading(false);}
  };
  reader.readAsBinaryString(file);
}

function parseRacineAsync(file,badges,setBadges,setCasiers,showToast,setLoading,addLog){
  setLoading(true);
  const reader=new FileReader();
  reader.onload=e=>{
    try{
      const wb=XLSX.read(e.target.result,{type:"binary"});
      const sheetNames=wb.SheetNames;
      const newBadges=[];const newCasiers=[];let id=nxId(badges)+1;let cid=1;

// ── Microsoft Lists CSV parser ──
function parseMSListsCSV(text){
  const lines=text.split(/\r?\n/);if(lines.length<2)return[];
  const sep=lines[0].includes(";")?";":",";
  const parseHeaders=line=>{const cols=[];let cur="";let inQ=false;for(const ch of line){if(ch==='"')inQ=!inQ;else if(ch===sep&&!inQ){cols.push(cur.replace(/^"|"$/g,"").trim());cur="";}else cur+=ch;}cols.push(cur.replace(/^"|"$/g,"").trim());return cols;};
  const parseLine=line=>{const cols=[];let cur="";let inQ=false;for(const ch of line){if(ch==='"')inQ=!inQ;else if(ch===sep&&!inQ){cols.push(cur.replace(/^"|"$/g,"").trim());cur="";}else cur+=ch;}cols.push(cur.replace(/^"|"$/g,"").trim());return cols;};
  const headers=parseHeaders(lines[0]);
  return lines.slice(1).filter(l=>l.trim()).map((line,idx)=>{const cols=parseLine(line);const o={_idx:idx};headers.forEach((h,i)=>{o[h]=cols[i]||"";});return o;});
}

// ════════ IMPRESSION DÉDIÉE — fenêtre séparée, dimensions exactes Avery L4785 ════════
function doPrintEtiquettes(toPrint, startPos, IMG_BG, IMG_LOGO, BLUE){
  // AVERY L4785 : marges top=13.42mm bottom=11.45mm left=19.70mm right=7.87mm
  // Étiquettes  : 80mm × 50mm | écart col=15mm | écart ligne=5.53mm
  const slots = [];
  for(let i=0;i<startPos;i++) slots.push(null);
  toPrint.forEach(b => slots.push(b));
  const PER_PAGE = 10;
  const total = Math.ceil(slots.length / PER_PAGE) * PER_PAGE || PER_PAGE;
  while(slots.length < total) slots.push(null);

  const esc = s => String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');

  const etiqHTML = b => {
    if(!b) return `<div style="width:80mm;min-width:80mm;height:50mm;flex-shrink:0"></div>`;
    const prenom = esc(b.prenom);
    const nom    = esc(b.nom);
    const mat    = b.matricule && String(b.matricule)!=='0' ? esc(b.matricule) : 'NC';
    return `<div style="width:80mm;min-width:80mm;height:50mm;flex-shrink:0;position:relative;overflow:hidden;background-color:#f8f8f8">
  <img src="${IMG_BG}" style="position:absolute;top:0;left:0;width:83mm;height:53mm;display:block">
  <img src="${IMG_LOGO}" style="position:absolute;top:1.64mm;left:29.10mm;width:43.59mm;height:14.01mm;object-fit:contain">
  <div style="position:absolute;bottom:8mm;left:5mm;right:2mm">
    <div style="font-weight:bold;font-size:16pt;font-family:Arial,sans-serif;color:#002E8A;line-height:1.25;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${prenom}</div>
    <div style="font-weight:bold;font-size:16pt;font-family:Arial,sans-serif;color:#002E8A;line-height:1.25;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${nom}</div>
    <div style="height:3mm"></div>
    <div style="font-weight:bold;font-style:italic;font-size:12pt;font-family:Arial,sans-serif;color:#002E8A">Matricule : ${mat}</div>
  </div>
</div>`;
  };
  let pagesHTML = '';
  for(let p=0; p<slots.length/PER_PAGE; p++){
    const sl = slots.slice(p*PER_PAGE, (p+1)*PER_PAGE);
    let inner = '';
    for(let r=0; r<5; r++){
      inner += `<div style="display:flex;flex-direction:row;align-items:flex-start">${etiqHTML(sl[r*2])}<div style="width:15mm;min-width:15mm;height:50mm;flex-shrink:0"></div>${etiqHTML(sl[r*2+1])}</div>`;
      if(r<4) inner += `<div style="height:5.53mm;font-size:0;line-height:0"></div>`;
    }
    pagesHTML += `<div style="width:210mm;height:297mm;padding:10.42mm 7.87mm 11.45mm 15.70mm;box-sizing:border-box;overflow:hidden;page-break-after:always">${inner}</div>`;
  }

  const html = `<!DOCTYPE html><html><head><meta charset="utf-8"><style>
@page{size:210mm 297mm;margin:0mm}
*{margin:0;padding:0;-webkit-print-color-adjust:exact!important;print-color-adjust:exact!important;color-adjust:exact!important}
html,body{width:210mm;min-height:297mm;background:#fff}
div[style*="background-image"]{-webkit-print-color-adjust:exact!important;print-color-adjust:exact!important}
</style></head><body>${pagesHTML}
<script>window.addEventListener('load',function(){setTimeout(function(){window.print();},1500);});<\/script>
</body></html>`;

  const w = window.open('','_blank');
  if(!w){alert('⚠️ Autorisez les popups pour imprimer.');return;}
  w.document.open();
  w.document.write(html);
  w.document.close();

// ── Parse FSS CSV ──
function parseFSSCsv(text, existingFss){
  const lines=text.split(/\r?\n/);if(lines.length<2)return[];
  const sep=lines[0].includes(";")?";":",";
  const parseRow=line=>{const cols=[];let cur="";let inQ=false;for(const ch of line){if(ch==='"')inQ=!inQ;else if(ch===sep&&!inQ){cols.push(cur.replace(/^"|"$/g,"").trim());cur="";}else cur+=ch;}cols.push(cur.replace(/^"|"$/g,"").trim());return cols;};
  const rawHeaders=parseRow(lines[0]);
  const headers=rawHeaders.map(h=>h.replace(/^\uFEFF/,"").replace(/^"+|"+$/g,"").trim());
  const result=[];let nextId=Math.max(0,...(existingFss||[]).map(f=>f.id||0))+1;
  lines.slice(1).filter(l=>l.trim()).forEach(line=>{
    const cols=parseRow(line);const o={};headers.forEach((h,i)=>{o[h]=cols[i]||"";});
    const nom=String(o["Nom"]||"").trim().toUpperCase();const prenom=String(o["Prénom"]||"").trim();
    if(!nom&&!prenom)return;
    const situation=String(o["Situation collaborateur"]||"").trim();
    const statut=String(o["Statut demande pour le FSS"]||"").trim();
    const lieu=String(o["Localisation"]||o['\uFEFF"Localisation"']||"").trim().replace(/^"+|"+$/g,"");
    const dateEvt=normDate(String(o["Date événement "]||o["Date événement"]||"").trim());
    const manager=String(o["Manager de l'embauché(e)"]||"").trim();
    const matPC=String(o["Demande de matériel en cours ? (PC)"]||"").trim();
    const ritm=String(o["N° RITM (plusieurs possibles)"]||"").trim();
    const matRecu=String(o["Materiel reçu au FSS local ? "]||o["Materiel reçu au FSS local ?"]||"").trim();
    const idMat=String(o["ID materiel (départ collab uniquement)"]||"").trim();
    const dateRecep=normDate(String(o["Date de réception "]||o["Date de réception"]||"").trim());
    const matDonne=String(o["Matériel donné au client ?  (Arrivés uniquement)"]||"").trim();
    const commentaires=String(o["Commentaires"]||"").trim();
    const isCloture=statut==="Terminée";
    result.push({id:nextId++,nom,prenom,situation,statut,lieu,dateEvt,manager,matPC,ritm,matRecu,idMat,dateRecep,matDonne,commentaires,cloture:isCloture});
  });
  return result;
}

function VueFieldSupport({fssData,setFssData,showToast,addLog,badges,casiers,setBadges,setCasiers,wdCache,settings}){
  const[search,setSearch]=useState("");const[fStat,setFStat]=useState("");const[fSit,setFSit]=useState("");
  const[selectedCard,setSelectedCard]=useState(null);
  const[editMode,setEditMode]=useState(false);const[editForm,setEditForm]=useState(null);
  const[showAddDepart,setShowAddDepart]=useState(false);const[showAddArrivee,setShowAddArrivee]=useState(false);
  const fssRef=useRef(null);
  const[sortFCol,setSortFCol]=useState("");const[sortFDir,setSortFDir]=useState("asc");
  const handleFSort=col=>{if(sortFCol===col)setSortFDir(d=>d==="asc"?"desc":"asc");else{setSortFCol(col);setSortFDir("asc");}};
  const SortFTh=({col,label,w})=>React.createElement("th",{onClick:()=>handleFSort(col),style:{padding:"6px 4px",width:w,fontWeight:700,fontSize:9,textTransform:"uppercase",letterSpacing:".3px",color:"var(--text2)",textAlign:"left",cursor:"pointer",userSelect:"none",background:sortFCol===col?"rgba(59,130,246,.08)":"transparent",whiteSpace:"nowrap"}},label+(sortFCol===col?(sortFDir==="asc"?" ↑":" ↓"):""));
  const[fssSyncStatus,setFssSyncStatus]=useState("idle"); // idle | saving | ok | error
  const syncTimerRef=useRef(null);

  // Helper — wrap toute opération Supabase FSS avec indicateur visuel
  const syncFss=async(fn,label)=>{
    setFssSyncStatus("saving");
    try{
      await fn();
      setFssSyncStatus("ok");
      if(syncTimerRef.current)clearTimeout(syncTimerRef.current);
      syncTimerRef.current=setTimeout(()=>setFssSyncStatus("idle"),3000);
    }catch(e){
      console.error("FSS sync error ["+label+"]",e);
      setFssSyncStatus("error");
      if(syncTimerRef.current)clearTimeout(syncTimerRef.current);
      syncTimerRef.current=setTimeout(()=>setFssSyncStatus("idle"),5000);
    }
  };

  // Arrivée/départ forms
  const[nomDep,setNomDep]=useState("");const[prenomDep,setPrenomDep]=useState("");const[dateDep,setDateDep]=useState("");
  const[nomArr,setNomArr]=useState("");const[prenomArr,setPrenomArr]=useState("");const[dateArr,setDateArr]=useState("");const[managerArr,setManagerArr]=useState("");
  const[inlineEdit,setInlineEdit]=useState(null);

  const importFSS=e=>{
    const file=e.target.files[0];if(!file)return;
    const reader=new FileReader();
    reader.onload=async ev=>{
      const parsed=parseFSSCsv(ev.target.result,fssData);
      if(!parsed.length){showToast("⚠️ Aucune donnée trouvée dans le CSV","err");return;}
      if(sb){
        await syncFss(async()=>{
          const rows=parsed.map(({id,...r})=>r);
          const{data,error}=await sb.from("lp24_fss").insert(rows).select();
          if(error)throw error;
          setFssData(prev=>[...prev,...(data||parsed)]);
          showToast("✅ "+parsed.length+" fiches importées et sauvegardées");
        },"import");
        if(fssSyncStatus==="error"){
          setFssData(prev=>[...prev,...parsed]);
          showToast("⚠️ "+parsed.length+" fiches importées (erreur sync)","err");
        }
      }else{
        setFssData(prev=>[...prev,...parsed]);
        showToast("✅ "+parsed.length+" fiches importées");
      }
      addLog("Import Field Support",parsed.length+" fiches");
    };reader.readAsText(file,"UTF-8");e.target.value="";
  };

  const filtered=useMemo(()=>fssData.filter(f=>{
    if(fStat&&f.statut!==fStat)return false;
    if(fSit&&f.situation!==fSit)return false;
    if(search){const q=norm(search);const hay=norm(f.nom+" "+f.prenom+" "+(f.lieu||"")+" "+(f.manager||""));if(!hay.includes(q))return false;}
    return true;
  }),[fssData,search,fStat,fSit]);

  const saveEdit=()=>{
    if(!editForm)return;
    const updated={...editForm,cloture:editForm.statut==="Terminée"};
    setFssData(p=>p.map(f=>f.id===updated.id?updated:f));
    setSelectedCard(updated);setEditForm({...updated});setEditMode(false);
    if(sb)syncFss(()=>sb.from("lp24_fss").upsert(updated,{onConflict:"id"}),"saveEdit");
    showToast("✅ Fiche mise à jour");addLog("Modif Field Support",updated.prenom+" "+updated.nom);
  };
  const toggleCloture=f=>{
    const updated={...f,cloture:!f.cloture,statut:f.cloture?"A traiter":"Terminée"};
    setFssData(p=>p.map(x=>x.id===f.id?updated:x));setSelectedCard(updated);
    if(sb)syncFss(()=>sb.from("lp24_fss").upsert(updated,{onConflict:"id"}),"toggleCloture");
    showToast(updated.cloture?"✅ Fiche clôturée":"↩️ Fiche rouverte");
  };
  const deleteFiche=id=>{
    if(!confirm("Supprimer cette fiche ?"))return;
    setFssData(p=>p.filter(f=>f.id!==id));setSelectedCard(null);
    if(sb)syncFss(()=>sb.from("lp24_fss").delete().eq("id",id),"delete");
    showToast("🗑️ Fiche supprimée");
  };
  const saveInlineEdit=()=>{
    if(!inlineEdit)return;
    const updated={...inlineEdit,cloture:inlineEdit.statut==="Terminée"};
    setFssData(p=>p.map(f=>f.id===updated.id?updated:f));
    setInlineEdit(null);
    if(sb)syncFss(()=>sb.from("lp24_fss").upsert(updated,{onConflict:"id"}),"saveInline");
    showToast("✅ Ligne mise à jour");

  // Enregistrer départ
  const enrDep=async()=>{

    const c=badges.find(b=>(b.nom.toLowerCase().includes(nomDep.toLowerCase())||!nomDep)&&(b.prenom.toLowerCase().includes(prenomDep.toLowerCase())||!prenomDep)&&b.statut!=="Archivé");

    const fssRow={nom:c.nom,prenom:c.prenom,situation:"Départ",statut:"A traiter",lieu:"",dateEvt:dateDep||todayISO(),manager:c.manager||"",matPC:"",ritm:"",matRecu:"",idMat:"",dateRecep:"",matDonne:"",commentaires:"",cloture:false};
    if(sb){

function App(){
  const[unlocked,setUnlocked]=useState(false);const[session,setSession]=useState({role:"admin",label:"Admin"});
  const[view,setView]=useState("accueil");
  const[badges,setBadges]=useState([]);

  const[wdCache,setWdCache]=useState(null);
  const[histo,setHisto]=useState([]);
  const[fssData,setFssData]=useState([]);
  const[newMats,setNewMats]=useState(new Set());
  const[settings,setSettings]=useState({restaurantEmail:"placedeseine@11h59.fr",ccEmails:"a.avonde@allianceautomotive.fr,ju.poitier@allianceautomotive.fr",itEmail:"",users:[],bodyArriveeResto:"Bonjour,\n\nNous vous informons de l'arrivée d'un nouveau collaborateur :\n\nNom : {nom}\nPrénom : {prenom}\nMatricule : {matricule}\nEmail : {email}\nDate d'entrée : {date_entree}\nManager : {manager}\n\nMerci de bien vouloir l'ajouter à vos systèmes.\n\nCordialement",bodyArriveeIT:"Bonjour,\n\nNous vous informons de l'arrivée d'un nouveau collaborateur :\n\nNom : {nom}\nPrénom : {prenom}\nMatricule : {matricule}\nEmail : {email}\nDate d'entrée : {date_entree}\nManager : {manager} ({mail_manager})\n\nMerci de créer les accès nécessaires.\n\nCordialement",bodyDepartResto:"Bonjour,\n\nNous vous informons du départ du collaborateur suivant :\n\nNom : {nom}\nPrénom : {prenom}\nMatricule : {matricule}\nN° badge : {serie}\nDate de sortie : {date_sortie_prevue}\nManager : {manager}\n\nMerci de bien vouloir le retirer de vos systèmes.\n\nCordialement",bodyDepartIT:"Bonjour,\n\nNous vous informons du départ du collaborateur suivant :\n\nNom : {nom}\nPrénom : {prenom}\nMatricule : {matricule}\nN° badge : {serie}\nDate de sortie : {date_sortie_prevue}\nManager : {manager} ({mail_manager})\n\nMerci de supprimer les accès.\n\nCordialement"});
  const[showSettings,setShowSettings]=useState(false);
  const[dbStatus,setDbStatus]=useState("loading");
  const[loading,setLoading]=useState(false);
  const[toast,setToast]=useState(null);
  const toastTimer=useRef(null);
  const racineRef=useRef(null);const hrRef=useRef(null);const hcmRef=useRef(null);const importJsonRef=useRef(null);
  
  // ── Auto-save ──
  const saveTimer=useRef(null);
  const[saving,setSaving]=useState(false);

  // Dates gérées manuellement uniquement — pas de sync auto Workday
  useEffect(()=>{
    if(!unlocked||!sb||!badges.length)return;
    if(saveTimer.current)clearTimeout(saveTimer.current);
    saveTimer.current=setTimeout(()=>{
      setSaving(true);
      const rows=badges.filter(b=>b.id);
      Promise.all(rows.map(b=>sb.from("lp24_badges").upsert(b))).then(()=>setTimeout(()=>setSaving(false),800)).catch(()=>setSaving(false));
    },2000);
  },[badges,unlocked]);

  // ── Auto-save FSS désactivé — chaque action sauvegarde individuellement ──
  // (upsert global risqué si IDs locaux ≠ IDs Supabase)

  // ── Auto-save settings (users, emails) dans Supabase ──
  const settingsTimer=useRef(null);
  useEffect(()=>{
    if(!unlocked||!sb)return;
    if(settingsTimer.current)clearTimeout(settingsTimer.current);
    settingsTimer.current=setTimeout(()=>{
      sb.from("lp24_settings").upsert({id:1,data:JSON.stringify(settings)}).catch(()=>{});
    },1500);
  },[settings,unlocked]);

  const showToast=(msg,type="ok")=>{if(toastTimer.current)clearTimeout(toastTimer.current);setToast({msg,type});toastTimer.current=setTimeout(()=>setToast(null),3500);};
  const addLog=useCallback((action,detail)=>{
  const entry={id:Date.now(),ts:TS(),action,detail,user:session?session.label:"admin"};
  setHisto(prev=>[entry,...prev].slice(0,300));
  if(sb){sb.from("historique").insert({action,detail,user:session?session.label:"admin",ts:new Date().toISOString()}).catch(()=>{});}
},[session]);

  // Expose file handlers for SettingsModal
  useEffect(()=>{
    window._handleRacine=(file)=>{parseRacineAsync(file,badges,setBadges,setCasiers,showToast,setLoading,addLog);setShowSettings(false);};
    window._handleHR=(file,type)=>{parseWDFileAsync(file,type,wdCache,setWdCache,showToast,setLoading);setShowSettings(false);};
    window._onWdImport=(parsed)=>{
      // Chercher badges sans matricule et les matcher avec Workday
      setBadges(prev=>{
        const updated=[...prev];const newIds=new Set();
        updated.forEach((b,i)=>{
          if(b.matricule&&String(b.matricule)!=="0")return;
          const n=b.nom.toUpperCase();const p=(b.prenom||"").toLowerCase();
          const match=parsed.find(w=>(w.nom.toUpperCase().includes(n)||n.includes(w.nom.toUpperCase()))&&(w.prenom.toLowerCase().includes(p)||p.includes(w.prenom.toLowerCase())));
          if(match&&match.matricule){updated[i]={...b,matricule:match.matricule,email:b.email||match.email,manager:b.manager||match.manager,mail_manager:b.mail_manager||match.mailMgr};newIds.add(b.id);if(sb)sb.from("lp24_badges").upsert(updated[i]);}
        });
        if(newIds.size>0)setNewMats(prev2=>new Set([...prev2,...newIds]));
        return updated;
      });
    };
  },[badges,wdCache,addLog]);

useEffect(()=>{
    if(!unlocked)return;
    if(!sb){setDbStatus("error");return;}
    async function load(){
      try{
        const[bRes,cRes]=await Promise.all([sb.from("lp24_badges").select("*").order("id"),sb.from("lp24_casiers").select("*").order("id")]);
        if(bRes.error)throw bRes.error;
        setBadges(bRes.data||[]);
        // Dédupliquer les casiers par numéro (protection contre les doublons Supabase)
        const rawCasiers=cRes.data||[];
        const casiersMap={};rawCasiers.forEach(c=>{if(c.numero)casiersMap[c.numero]=c;});
        setCasiers(Object.values(casiersMap));
        
        // Charger les paramètres persistants (users, emails)
        try{
          const {data:sData}=await sb.from("lp24_settings").select("*").eq("id",1).single();
          if(sData&&sData.data){
            const parsed=typeof sData.data==="string"?JSON.parse(sData.data):sData.data;
            setSettings(prev=>({...prev,...parsed}));
          }
        }catch(se){console.log("Settings non trouvés (normal au 1er démarrage)",se);}
        
        // Charger l'historique
        const { data: histoData } = await sb.from("historique").select("*").order("id", { ascending: false }).limit(500);
        if(histoData){
          setHisto(histoData.map(h => ({...h, ts: new Date(h.ts).toLocaleString("fr-FR")})));
        } else {
          setHisto([]);
        }

        // Charger les fiches Field Support
        try{
          const fssRes=await sb.from("lp24_fss").select("*").order("id");
          if(fssRes.data&&fssRes.data.length)setFssData(fssRes.data);
        }catch(fe){console.log("Table lp24_fss non trouvée — créez-la dans Supabase",fe);}
        
        setDbStatus("ok");
      }
      catch(e){
        console.log("Erreur chargement:", e);
        setDbStatus("error");
      }
    }
    load();
  },[unlocked]);

  const exportExcel=useCallback(()=>{
    if(typeof XLSX==="undefined"){alert("XLSX non disponible");return;}
    const wb=XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb,XLSX.utils.json_to_sheet(badges.map(b=>({Matricule:b.matricule,Nom:b.nom,Prénom:b.prenom,Email:b.email||"","N° Badge (Série)":b.serie||"","Carte rechargement":b.carte_rechargement||"",Casier:b.casier||"",Manager:b.manager||"","Email Manager":b.mail_manager||"",Statut:b.statut,"Date sortie":b.date_sortie_prevue||"","Archivé le":b.date_archive||"",Commentaire:b.commentaire||""}))),
    "Collaborateurs");
    XLSX.utils.book_append_sheet(wb,XLSX.utils.json_to_sheet(casiers.map(c=>({Zone:c.zone,"N° Casier":c.numero,Occupant:c.occupant||"",Statut:c.statut}))),
    "Casiers");
    XLSX.writeFile(wb,"Collaborateurs_"+todayISO()+".xlsx");
    showToast("✅ Export Excel effectué");
  },[badges,casiers]);

  const exportJSON=useCallback(()=>{
    // Inclure wdCache dans la sauvegarde
    const d={version:4,date:new Date().toISOString(),badges,casiers,wdCache:wdCache||{}};
    const blob=new Blob([JSON.stringify(d,null,2)],{type:"application/json"});
    const url=URL.createObjectURL(blob);const a=document.createElement("a");a.href=url;a.download="Sauvegarde_Collaborateurs_"+todayISO()+".json";document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(url);
    showToast("✅ Sauvegarde JSON téléchargée (Workday inclus)");
  },[badges,casiers,wdCache]);

  const importJSON=useCallback(e=>{
    const file=e.target.files[0];if(!file)return;
    const reader=new FileReader();
    reader.onload=async ev=>{
      try{
        const data=JSON.parse(ev.target.result);
        if(!data.badges&&!data.collaborateurs){alert("Fichier JSON invalide.");return;}
        if(!confirm("Remplacer toutes les données par ce fichier JSON ?"))return;
        const b=data.badges||data.collaborateurs||[];const c=data.casiers||[];
        // Restaurer wdCache si présent dans le JSON
        const wd=data.wdCache&&Object.keys(data.wdCache).length>0?data.wdCache:null;
        setBadges(b);setCasiers(c);if(wd)setWdCache(wd);
        if(sb){await sb.from("lp24_badges").delete().neq("id",0);await sb.from("lp24_casiers").delete().neq("id",0);if(b.length)await sb.from("lp24_badges").insert(b.map(({id,...r})=>r));if(c.length)await sb.from("lp24_casiers").insert(c.map(({id,...r})=>r));}
        addLog("Import JSON",b.length+" collaborateurs, "+c.length+" casiers"+(wd?" + Workday ("+Object.keys(wd).length+" entrées)":""));

function AddUserForm({settings,setSettings,showToast}){
  const[nu,setNu]=useState({email:"",pwd:"",label:""});
  const allViews=["accueil","collaborateurs","casiers","rapport","impression","historique","archives"];
  const[blocked,setBlocked]=useState(new Set());
  const toggleBlock=v=>setBlocked(p=>{const n=new Set(p);n.has(v)?n.delete(v):n.add(v);return n;});
  const addUser=()=>{
    if(!nu.email||!nu.pwd){showToast("⚠️ Email et mot de passe requis","err");return;}
    const perms={};allViews.forEach(v=>{perms[v]=blocked.has(v)?PERM_NONE:PERM_WRITE;});
    setSettings(s=>({...s,users:[...(s.users||[]),{...nu,perms}]}));
    setNu({email:"",pwd:"",label:""});setBlocked(new Set());
    showToast("✅ Compte ajouté");

    React.createElement("div",{style:{fontWeight:600,fontSize:12,color:"#374151",marginBottom:8}},"+ Ajouter un compte"),
    React.createElement("div",{style:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:6,marginBottom:6}},

      React.createElement("input",{type:"text",value:nu.pwd,onChange:e=>setNu(u=>({...u,pwd:e.target.value})),placeholder:"Mot de passe",style:{padding:"6px 8px",borderRadius:5,border:"1px solid #D1D5DB",fontSize:12,gridColumn:"1/-1"}})
    ),
    React.createElement("div",{style:{marginBottom:8}},
      React.createElement("div",{style:{fontSize:11,fontWeight:600,color:"#6B7280",marginBottom:4}},"🔒 Bloquer l'accès à ces vues :"),
      React.createElement("div",{style:{display:"flex",flexWrap:"wrap",gap:6}},
        allViews.map(v=>React.createElement("label",{key:v,style:{display:"flex",alignItems:"center",gap:4,fontSize:11,cursor:"pointer",background:blocked.has(v)?"#FDEDEC":"#F3F4F6",color:blocked.has(v)?"#E74C3C":"#374151",borderRadius:5,padding:"3px 8px",border:"1px solid "+(blocked.has(v)?"#F1948A":"#E5E7EB")}},
          React.createElement("input",{type:"checkbox",checked:blocked.has(v),onChange:()=>toggleBlock(v),style:{margin:0}}),v

  );
}

function VueRechercheGlobale({badges,casiers,q,setView}){

    return{
      badges:badges.filter(b=>norm(b.nom+" "+b.prenom+" "+(b.matricule||"")+" "+(b.serie||"")).includes(nq)),
      casiers:casiers.filter(c=>norm(c.numero+" "+c.occupant+" "+c.matricule).includes(nq))
    };
  },[badges,casiers,q]);
  const tot=res.badges.length+res.casiers.length;
  return React.createElement("div",null,
    React.createElement("h1",{style:{fontSize:22,fontWeight:700,marginBottom:16}},"🔍 Résultats pour ",q),
    q.length<2?React.createElement("p",{style:{color:"#9CA3AF",textAlign:"center",padding:32}},"Saisissez au moins 2 caractères"):
    tot===0?React.createElement("p",{style:{color:"#9CA3AF",textAlign:"center",padding:32}},"Aucun résultat"):
    React.createElement("div",null,
      React.createElement("p",{style:{fontSize:13,color:"#6B7280",marginBottom:12}},tot+" résultat(s)"),
      res.badges.length>0&&React.createElement("div",{style:{background:"#fff",borderRadius:12,boxShadow:"0 1px 3px rgba(0,0,0,.08)",padding:16,marginBottom:12,borderLeft:"4px solid #0891B2"}},
        React.createElement("h3",{style:{fontWeight:700,color:"#0891B2",fontSize:14,marginBottom:10}},"👥 Collaborateurs ("+res.badges.length+")"),
        res.badges.map(b=>React.createElement("div",{key:b.id,style:{display:"flex",justifyContent:"space-between",padding:"7px 0",borderBottom:"1px solid #F3F4F6",cursor:"pointer"},onClick:()=>setView("collaborateurs")},
          React.createElement("span",null,React.createElement("b",null,b.nom)," ",b.prenom," ",React.createElement("span",{style:{color:"#9CA3AF",fontSize:11}},b.matricule||"")),
          React.createElement("span",{style:{background:b.statut==="Actif"?"#E6F9EE":b.statut==="Archivé"?"#F5F5F5":"#FDEDEC",color:b.statut==="Actif"?"#00B050":b.statut==="Archivé"?"#808080":"#E74C3C",borderRadius:999,fontSize:11,fontWeight:700,padding:"2px 8px"}},b.statut)
        ))

        res.casiers.map(c=>React.createElement("div",{key:c.id,style:{display:"flex",justifyContent:"space-between",padding:"7px 0",borderBottom:"1px solid #F3F4F6",cursor:"pointer"},onClick:()=>setView("casiers")},
          React.createElement("span",null,React.createElement("b",{style:{color:"#7C3AED"}},c.numero)," ",c.occupant||""),
          React.createElement("span",{style:{color:"#6B7280",fontSize:12}},c.zone)
