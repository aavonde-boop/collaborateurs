// ── Parse Workday (HR Data / Future Hires) ──
function parseWDFileAsync(file,type,wdCache,setWdCache,showToast,setLoading){
  setLoading(true);
  const reader=new FileReader();
  reader.onload=e=>{
    try{
      const wb=XLSX.read(e.target.result,{type:"binary"});
      let wsName=wb.SheetNames[0];
      const wdTab=wb.SheetNames.find(s=>s.toLowerCase().includes("workday"));
      if(wdTab)wsName=wdTab;
      const ws=wb.Sheets[wsName];
      // Fix dimension A1:A1
      const cellKeys=Object.keys(ws).filter(k=>!k.startsWith("!"));
      if(cellKeys.length>0){
        let maxR=0,maxC=0;
        cellKeys.forEach(addr=>{try{const d=XLSX.utils.decode_cell(addr);if(d.r>maxR)maxR=d.r;if(d.c>maxC)maxC=d.c;}catch(e){}});
        ws["!ref"]=XLSX.utils.encode_range({s:{r:0,c:0},e:{r:maxR,c:maxC}});
      }
      const data=XLSX.utils.sheet_to_json(ws,{header:1,defval:""});
      let hRow=-1;
      for(let i=0;i<Math.min(data.length,30);i++){
        const row=data[i];
        if(!Array.isArray(row)||!row.length)continue;
        if(row.some(v=>String(v||"").toLowerCase().replace(/\s+/g," ").trim()==="employee id")){hRow=i;break;}
      }
      if(hRow<0){
        const preview=data.slice(0,5).map((r,i)=>i+": "+JSON.stringify(r).slice(0,80)).join("\n");
        alert("Colonne 'Employee ID' introuvable.\nFichier: "+file.name+"\n\nContenu:\n"+preview);
        setLoading(false);return;
      }
      const headers=data[hRow].map(h=>String(h||"").trim());
      const rows=data.slice(hRow+1).filter(r=>Array.isArray(r)&&r.some(v=>v!==""&&v!==null));
      const parsed=[];
      rows.forEach(r=>{
        const o={};headers.forEach((h,i)=>{if(h)o[h]=r[i]!==undefined&&r[i]!==null?r[i]:"";});
        const mat=String(o["Employee ID"]||"").trim();
        const nom=String(o["Preferred Name - Last Name"]||"").trim().toUpperCase();
        const prenom=String(o["Preferred Name - First Name"]||"").trim();
        if(!mat||!nom)return;
        const toISO=v=>{if(!v||v==="")return"";if(typeof v==="number")return xlsxDateToISO(v);const s=String(v).trim();if(!s||s==="NaN")return"";const dm=s.match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})/);if(dm)return dm[3]+"-"+dm[2].padStart(2,"0")+"-"+dm[1].padStart(2,"0");if(s.match(/^\d{4}-\d{2}-\d{2}/))return s.slice(0,10);try{const d=new Date(s);if(!isNaN(d))return d.toISOString().slice(0,10);}catch{}return"";};
        parsed.push({matricule:mat,nom,prenom,workerType:String(o["Worker Type"]||"").trim(),actif:String(o["Active Status"]||"").trim(),location:String(o["Location"]||"").trim(),email:String(o["Email - Primary Work"]||o["Work Email"]||"").trim(),manager:String(o["Manager's Name"]||o["Manager"]||"").trim(),mailMgr:String(o["Manager e-mail"]||o["Manager's Email"]||"").trim(),hireDate:toISO(o["Hire Date"]),termDate:toISO(o["Termination Date"]),source:type});
      });
      if(!parsed.length){alert("Aucune donnée valide.");setLoading(false);return;}
      setWdCache(prev=>{const next={...(prev||{})};parsed.forEach(p=>{next[p.matricule]=p;});return next;});
      setLoading(false);
      showToast("✅ "+parsed.length+" collaborateurs chargés ("+(type==="hr"?"HR Data":"Future Hires")+")");
    }catch(err){alert("Erreur : "+err.message);setLoading(false);}
  };
  reader.readAsBinaryString(file);
}

// ── Parse Racine Commune ──
function parseRacineAsync(file,badges,setBadges,setCasiers,showToast,setLoading,addLog){
  setLoading(true);
  const reader=new FileReader();
  reader.onload=e=>{
    try{
      const wb=XLSX.read(e.target.result,{type:"binary"});
      const sheetNames=wb.SheetNames;
      const newBadges=[];const newCasiers=[];let id=nxId(badges)+1;let cid=1;
      const isV1=sheetNames.includes("LP 24");
      const isV2=!isV1&&sheetNames.some(s=>s.includes("Badges Actifs")||s.includes("cupérer")||s.includes("📦"));
      const getVal=v=>{if(v===null||v===undefined)return"";if(typeof v==="object"&&v.v!==undefined)return String(v.v);const s=String(v).trim();if(s.startsWith("="))return"";return s;};
      if(isV2){
        const readSheet=ws=>{const raw=XLSX.utils.sheet_to_json(ws,{header:1,defval:""});let hRow=0;for(let i=0;i<Math.min(raw.length,5);i++){const r=raw[i];if(r.some(v=>["Matricule","Nom","Zone","N° Casier"].includes(String(v||"").trim()))){hRow=i;break;}}const headers=raw[hRow].map(h=>String(h||"").trim());return raw.slice(hRow+1).map(r=>{const o={};headers.forEach((h,i)=>{if(h)o[h]=r[i]!==undefined?r[i]:"";});return o;});};
        const wsA=sheetNames.find(s=>s.includes("Badges Actifs")||s.includes("Actifs"));
        if(wsA){readSheet(wb.Sheets[wsA]).forEach(r=>{const nom=String(r["Nom"]||"").trim().toUpperCase();const prenom=String(r["Prénom"]||"").trim();if(!nom&&!prenom)return;newBadges.push({id:id++,matricule:String(r["Matricule"]||"").trim(),nom,prenom,email:String(r["Email"]||"").trim(),serie:String(r["N° Badge (Série)"]||r["N° Série Badge"]||"").trim(),zeplug:String(r["N° Zeplug"]||"").trim(),carte_rechargement:String(r["N° Zeplug"]||"").trim(),casier:String(r["N° Casier"]||"").trim(),manager:String(r["Manager"]||"").trim(),mail_manager:String(r["Mail Manager"]||"").trim(),statut:"Actif",date_sortie_prevue:"",date_archive:"",commentaire:""});});}
        const wsR=sheetNames.find(s=>s.includes("cupérer")||s.includes("Récupérer"));
        if(wsR){readSheet(wb.Sheets[wsR]).forEach(r=>{const nom=String(r["Nom"]||"").trim().toUpperCase();const prenom=String(r["Prénom"]||"").trim();if(!nom&&!prenom)return;newBadges.push({id:id++,matricule:String(r["Matricule"]||"").trim(),nom,prenom,email:String(r["Email"]||"").trim(),serie:String(r["N° Badge (Série)"]||"").trim(),zeplug:String(r["N° Zeplug"]||"").trim(),carte_rechargement:String(r["N° Zeplug"]||"").trim(),casier:String(r["N° Casier"]||"").trim(),manager:String(r["Manager"]||"").trim(),mail_manager:String(r["Mail Manager"]||"").trim(),statut:"À récupérer",date_sortie_prevue:"",date_archive:"",commentaire:""});});}
        const wsC=sheetNames.find(s=>s.includes("Casier")||s.includes("📦"));
        if(wsC){const ZMAP={"levallois":"LV","paris":"PA","seine":"SE","defense":"DE","défense":"DE"};readSheet(wb.Sheets[wsC]).forEach(r=>{const num=String(r["N° Casier"]||"").trim();if(!num||num.length<3)return;const zl=String(r["Zone"]||"").trim();if(zl.startsWith("──")||!zl)return;let zone=num.substring(0,2).toUpperCase();Object.entries(ZMAP).forEach(([k,v])=>{if(zl.toLowerCase().includes(k))zone=v;});const occupant=String(r["Occupant"]||"").trim();const commentaire=String(r["Statut"]||r["Remarque"]||"").trim();newCasiers.push({id:cid++,numero:num,zone,occupant,matricule:"",statut:occupant?"Occupé":"Libre",commentaire});});}
      }else if(isV1){
        const wsLP=wb.Sheets["LP 24"];
        if(!wsLP){alert("Feuille 'LP 24' introuvable.");setLoading(false);return;}
        const lp24=XLSX.utils.sheet_to_json(wsLP,{header:1,defval:""});
        for(let i=1;i<lp24.length;i++){
          const r=lp24[i];if(!r||r.length<4)continue;
          const nom=getVal(r[4]).toUpperCase();const prenom=getVal(r[5]);
          if(!nom&&!prenom)continue;if(nom.startsWith("=")||prenom.startsWith("="))continue;
          const ds=r[0];
          const dsNum=typeof ds==="number"?ds:(typeof ds==="string"?parseFloat(ds):NaN);
          const actif=ds===null||ds===undefined||ds===""||ds===0||(typeof ds==="string"&&(ds.includes("N/A")||ds.trim()==="0"))||(!isNaN(dsNum)&&dsNum<1000);
          const serie=getVal(r[9]);const zeplug=getVal(r[10]);
          newBadges.push({id:id++,matricule:getVal(r[2]),nom,prenom,email:getVal(r[7]),serie,zeplug,carte_rechargement:zeplug,casier:getVal(r[11]),manager:getVal(r[13]),mail_manager:getVal(r[12]),statut:actif?"Actif":"À récupérer",date_sortie_prevue:"",date_archive:"",commentaire:""});
        }
        const wsCS=wb.Sheets["Casier LP24"];
        if(wsCS){const cas=XLSX.utils.sheet_to_json(wsCS,{header:1,defval:""});for(let i=0;i<cas.length;i++){const r=cas[i];if(!r||r.length<2)continue;const num=getVal(r[2]);if(num==="Numéro"||num.startsWith("Zone")||num.length<3)continue;const occupant=getVal(r[1]);const commentaire=getVal(r[4]);newCasiers.push({id:cid++,numero:num,zone:num.substring(0,2).toUpperCase(),occupant,matricule:"",statut:occupant?"Occupé":"Libre",commentaire});}}
      }else{alert("Format non reconnu. Attendu : 'LP 24' (v1) ou 'Badges Actifs' (v2).");setLoading(false);return;}
      if(!newBadges.length){alert("Aucun collaborateur trouvé.");setLoading(false);return;}
      // Doublons badge
      const serieCount={};newBadges.forEach(b=>{if(b.serie)serieCount[b.serie]=(serieCount[b.serie]||0)+1;});
      const doublons=Object.entries(serieCount).filter(([,c])=>c>1).map(([s])=>s);
      const archives=badges.filter(b=>b.statut==="Archivé");
      const allBadges=[...newBadges,...archives];
      setBadges(allBadges);
      if(newCasiers.length)setCasiers(newCasiers);
      addLog("Import Racine","Fichier: "+file.name+" — "+newBadges.filter(b=>b.statut==="Actif").length+" actifs, "+newBadges.filter(b=>b.statut==="À récupérer").length+" à récupérer"+(doublons.length?" ⚠️ Doublons: "+doublons.join(", "):""));
      if(sb){sb.from("lp24_badges").delete().neq("id",0).then(()=>{const rows=allBadges.map(({id,...r})=>r);if(rows.length)sb.from("lp24_badges").insert(rows);});if(newCasiers.length)sb.from("lp24_casiers").delete().neq("id",0).then(()=>{const rows=newCasiers.map(({id,...r})=>r);if(rows.length)sb.from("lp24_casiers").insert(rows);});}
      showToast("✅ "+newBadges.filter(b=>b.statut==="Actif").length+" actifs · "+newBadges.filter(b=>b.statut==="À récupérer").length+" à récupérer · "+newCasiers.length+" casiers"+(doublons.length?" ⚠️ "+doublons.length+" doublon(s)":""));
      setLoading(false);
    }catch(err){alert("Erreur import : "+err.message);setLoading(false);}
  };
  reader.readAsBinaryString(file);
}

// ── Microsoft Lists CSV parser ──
function parseMSListsCSV(text){
  const lines=text.split(/\r?\n/);if(lines.length<2)return[];
  const sep=lines[0].includes(";")?";":",";
  const parseHeaders=line=>{const cols=[];let cur="";let inQ=false;for(const ch of line){if(ch==='"')inQ=!inQ;else if(ch===sep&&!inQ){cols.push(cur.replace(/^"|"$/g,"").trim());cur="";}else cur+=ch;}cols.push(cur.replace(/^"|"$/g,"").trim());return cols;};
  const parseLine=line=>{const cols=[];let cur="";let inQ=false;for(const ch of line){if(ch==='"')inQ=!inQ;else if(ch===sep&&!inQ){cols.push(cur.replace(/^"|"$/g,"").trim());cur="";}else cur+=ch;}cols.push(cur.replace(/^"|"$/g,"").trim());return cols;};
  const headers=parseHeaders(lines[0]);
  return lines.slice(1).filter(l=>l.trim()).map((line,idx)=>{const cols=parseLine(line);const o={_idx:idx};headers.forEach((h,i)=>{o[h]=cols[i]||"";});return o;});
}

// ════════════════ VUE ACCUEIL ════════════════
function VueAccueil({badges,casiers,setView,wdCache,setBadges,setCasiers,showToast,addLog}){

  const aVenir7j=new Date();aVenir7j.setDate(aVenir7j.getDate()+7);const aVenir7jISO=aVenir7j.toISOString().slice(0,10);
  const expirantBientot=actifs.filter(b=>b.date_sortie_prevue&&b.date_sortie_prevue>=today&&b.date_sortie_prevue<=aVenir7jISO);
  const actifsSansArch=badges.filter(b=>b.statut!=="Archivé");
  const sansMatAvecBadge=actifsSansArch.filter(b=>(!b.matricule||String(b.matricule)==="0")&&b.serie);
  const sansMatSansBadge=actifsSansArch.filter(b=>(!b.matricule||String(b.matricule)==="0")&&!b.serie);
  const avecMatSansBadge=actifsSansArch.filter(b=>b.matricule&&String(b.matricule)!=="0"&&!b.serie);
